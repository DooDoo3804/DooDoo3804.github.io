<!-- Konami Code Easter Egg -->
<script>
(function() {
    var k = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'], n = 0;
    document.addEventListener('keydown', function(e) {
        if (e.key === k[n]) {
            n++;
            if (n === k.length) {
                n = 0;
                document.body.style.transition = 'filter 0.5s';
                document.body.style.filter = 'hue-rotate(180deg)';
                setTimeout(function() { document.body.style.filter = ''; }, 3000);
            }
        } else { n = 0; }
    });
})();
</script>

<!-- Keyboard Shortcuts Panel -->
<script>
(function() {
    var shortcuts = [
        { key: '/', desc: 'Search' },
        { key: '?', desc: 'Show shortcuts' },
        { key: 'Esc', desc: 'Close panel' },
        { key: '←', desc: 'Previous post' },
        { key: '→', desc: 'Next post' },
        { key: 'g h', desc: 'Go to Home' },
        { key: 'g a', desc: 'Go to Archive' },
        { key: 'g g', desc: 'Go to Graph' },
        { key: '↑↑↓↓←→←→BA', desc: 'Easter egg' }
    ];

    var panel = document.createElement('div');
    panel.className = 'shortcuts-panel';
    panel.innerHTML = '<div class="shortcuts-overlay"></div><div class="shortcuts-content">' +
        '<h3>⌨ Keyboard Shortcuts</h3>' +
        '<div class="shortcuts-list">' +
        shortcuts.map(function(s) {
            return '<div class="shortcut-item"><kbd>' + s.key + '</kbd><span>' + s.desc + '</span></div>';
        }).join('') +
        '</div>' +
        '<p class="shortcuts-hint">Press <kbd>?</kbd> or <kbd>Esc</kbd> to close</p>' +
        '</div>';
    panel.style.display = 'none';
    document.body.appendChild(panel);

    var pendingKey = null;

    document.addEventListener('keydown', function(e) {
        var tag = (e.target.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable) return;

        // ? 토글
        if (e.key === '?' || (e.key === '/' && e.shiftKey)) {
            e.preventDefault();
            panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
            return;
        }

        // Esc 닫기
        if (e.key === 'Escape' && panel.style.display !== 'none') {
            panel.style.display = 'none';
            return;
        }

        // g + h/a/g 네비게이션
        if (e.key === 'g') {
            pendingKey = 'g';
            setTimeout(function() { pendingKey = null; }, 1000);
            return;
        }

        if (pendingKey === 'g') {
            pendingKey = null;
            if (e.key === 'h') window.location.href = '/';
            else if (e.key === 'a') window.location.href = '/archive/';
            else if (e.key === 'g') window.location.href = '/graph/';
            return;
        }

        // ← → 포스트 네비게이션
        if (panel.style.display !== 'none') return;
        if (document.querySelector('.search-page.search-active, #lightbox-overlay.active')) return;
        if (e.key === 'ArrowLeft') {
            var prev = document.querySelector('.pager .previous a');
            if (prev) { window.location.href = prev.href; }
        }
        if (e.key === 'ArrowRight') {
            var next = document.querySelector('.pager .next a');
            if (next) { window.location.href = next.href; }
        }
    });

    panel.querySelector('.shortcuts-overlay').addEventListener('click', function() {
        panel.style.display = 'none';
    });
})();
</script>

<!-- Link prefetch on hover -->
<script>
(function() {
    var prefetched = {};
    var timer = null;

    document.addEventListener('mouseover', function(e) {
        var link = e.target.closest('a[href]');
        if (!link) return;

        var href = link.href;
        if (link.hostname !== location.hostname) return;
        if (href === location.href) return;
        if (prefetched[href]) return;
        if (link.getAttribute('href').charAt(0) === '#') return;
        if (link.protocol !== 'https:' && link.protocol !== 'http:') return;

        timer = setTimeout(function() {
            var prefetchLink = document.createElement('link');
            prefetchLink.rel = 'prefetch';
            prefetchLink.href = href;
            document.head.appendChild(prefetchLink);
            prefetched[href] = true;
        }, 200);
    }, { passive: true });

    document.addEventListener('mouseout', function(e) {
        if (timer) { clearTimeout(timer); timer = null; }
    }, { passive: true });
})();
</script>

<!-- async load function -->
<script>
    if (typeof loadScript !== 'function') {
        function loadScript(u, c) {
            var d = document, t = 'script',
                o = d.createElement(t),
                s = d.getElementsByTagName(t)[0];
            o.src = u;
            if (c) { o.addEventListener('load', function (e) { c(null, e); }, false); }
            s.parentNode.insertBefore(o, s);
        }
    }
</script>

<script>
    // https://stackoverflow.com/questions/9975810/make-iframe-automatically-adjust-height-according-to-the-contents-without-using
    function resizeIframe(obj) {
        obj.style.height = obj.contentWindow.document.body.scrollHeight + 'px';

    document.addEventListener('DOMContentLoaded', function () {
        var chartEl = document.querySelector("#chart");
        chartEl.onload = function () {
            resizeIframe(chartEl);

        }, { passive: true });
    });
</script>

<!-- Multi-Lingual -->
{% if page.multilingual %}
<!-- Handle Language Change -->
<script type="text/javascript">
    // get nodes
    var $kr = document.querySelector(".kr");
    var $en = document.querySelector(".en");
    var $ja = document.querySelector(".ja");
    var $select = document.querySelector("select");

    // Changes at v1.8.1: include lang flag as a url query. This interop well with catalog hash anchors.
    function getLang() { return new URLSearchParams(document.location.search).get("lang") }

    function setLang(newLang) {
        // Update URL without reload (pushState)
        var params = new URLSearchParams(document.location.search)
        params.set("lang", newLang)
        var newUrl = document.location.pathname + '?' + params.toString() + document.location.hash;
        history.replaceState(null, '', newUrl);
        // Re-render in place (no page reload)
        _render();
    }

    function _hideAll() {
        [$kr, $en, $ja].forEach(function(el) {
            if (el) { el.style.display = "none"; el.classList.remove("active"); }
        });
    }

    // handle render
    function _render() {
        var lang = getLang()
        _hideAll();
        if (lang == "en") {
            $select.selectedIndex = 1;
            if ($en) { $en.style.display = "block"; $en.classList.add("active"); }
        } else if (lang == "ja") {
            $select.selectedIndex = 2;
            if ($ja) { $ja.style.display = "block"; $ja.classList.add("active"); }
        } else {
            // default to kr
            $select.selectedIndex = 0;
            if ($kr) { $kr.style.display = "block"; $kr.classList.add("active"); }
        }
        // TOC is auto-generated by toc.js on DOMContentLoaded
    }

    // init — deferred so DOM is available (loaded with defer)
    document.addEventListener('DOMContentLoaded', function () {
        _render();

        // handle select change via addEventListener (no inline handler)
        if ($select) {
            $select.addEventListener('change', function () {
                var index = this.options[this.selectedIndex].value;
                var lang;
                if (index == 0) {
                    lang = "kr";
                } else if (index == 1) {
                    lang = "en";
                } else {
                    lang = "ja";
                }
                setLang(lang);
            });
        }
    });
</script>
{% endif %}

<!-- Pagefind Search -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Safety: remove stale no-scroll from previous page state
        document.body.classList.remove('no-scroll');

        // bfcache: when navigating back, DOMContentLoaded won't fire again
        window.addEventListener('pageshow', function(e) {
            if (e.persisted) document.body.classList.remove('no-scroll');
        });

        var pagefind = null;
        var _searchActiveIdx = -1;

        var searchPage = document.querySelector('.search-page');
        var searchOpenBtns = document.querySelectorAll('.search-icon');
        var searchCloseBtn = document.querySelector('.search-icon-close');
        var searchInput = document.getElementById('search-input');
        var bodyEl = document.body;
        var resultCount = document.getElementById('search-result-count');
        var emptyState = document.getElementById('search-empty-state');
        var resultsContainer = document.getElementById('search-results');

        // Lazy-load Pagefind on first search open
        async function ensurePagefind() {
            if (pagefind) return pagefind;
            try {
                pagefind = await import('{{ site.baseurl }}/pagefind/pagefind.js');
                await pagefind.init();
            } catch (e) {
                console.warn('Pagefind not available (expected in local dev):', e.message);
                pagefind = null;
            }
            return pagefind;
        }

        // Render search results
        function renderResults(results) {
            if (!results || results.length === 0) {
                resultsContainer.innerHTML = '';
                return;
            }
            var html = results.map(function(r, i) {
                var title = r.meta && r.meta.title ? r.meta.title : 'Untitled';
                var excerpt = r.excerpt || '';
                var url = r.url || '#';
                return '<div class="search-result-item" data-url="' + url + '" style="animation-delay:' + (i * 0.04) + 's">' +
                    '<a href="' + url + '">' +
                    '<h2 class="post-title">' + title + '</h2>' +
                    '<p class="search-excerpt">' + excerpt + '</p>' +
                    '</a></div>';
            }).join('');
            resultsContainer.innerHTML = html;
        }

        // Debounced search
        var _searchTimer;
        async function doSearch() {
            var query = (searchInput.value || '').trim();
            _searchActiveIdx = -1;

            if (query.length === 0) {
                resultsContainer.innerHTML = '';
                resultsContainer.setAttribute('aria-busy', 'false');
                resultCount.textContent = '';
                resultCount.style.display = 'none';
                emptyState.style.display = 'none';
                return;
            }

            resultsContainer.setAttribute('aria-busy', 'true');

            var pf = await ensurePagefind();
            if (!pf) {
                resultsContainer.setAttribute('aria-busy', 'false');
                emptyState.style.display = '';
                var emptyText = emptyState.querySelector('.search-empty-text');
                if (emptyText) emptyText.innerHTML = '<strong>Search unavailable</strong><br><span style="font-size:14px;opacity:0.7">Search index not found (build with Pagefind first)</span>';
                return;
            }

            var search = await pf.search(query);
            var results = await Promise.all(
                search.results.slice(0, 20).map(function(r) { return r.data(); })
            );

            renderResults(results);
            resultsContainer.setAttribute('aria-busy', 'false');

            if (results.length > 0) {
                var totalResults = search.results.length;
                var countText = totalResults + ' result' + (totalResults !== 1 ? 's' : '') + ' found';
                if (totalResults > 20) {
                    countText += ' (showing top 20)';
                }
                resultCount.textContent = countText;
                resultCount.style.display = '';
                emptyState.style.display = 'none';
            } else {
                resultCount.textContent = '';
                resultCount.style.display = 'none';
                var safeQuery = query.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
                var hint = query.length <= 2
                    ? 'Try a longer search term for better results'
                    : '"' + safeQuery + '" \u2014 check spelling or try different keywords';
                var emptyText = emptyState.querySelector('.search-empty-text');
                if (emptyText) {
                    emptyText.innerHTML = '<strong>No results found</strong><br><span style="font-size:14px;opacity:0.7">' + hint + '</span>';
                }
                emptyState.style.display = '';
            }
        }

        if (searchInput) {
            searchInput.addEventListener('input', function() {
                clearTimeout(_searchTimer);
                _searchTimer = setTimeout(doSearch, 200);
            });
        }

        // Keyboard navigation for results
        function setActiveResult(idx) {
            var items = resultsContainer.querySelectorAll('.search-result-item');
            items.forEach(function(el) { el.classList.remove('search-result-active'); });
            if (idx >= 0 && idx < items.length) {
                _searchActiveIdx = idx;
                var active = items[idx];
                active.classList.add('search-result-active');
                if (active.offsetTop < resultsContainer.scrollTop) {
                    resultsContainer.scrollTop = active.offsetTop - 8;
                } else if (active.offsetTop + active.offsetHeight > resultsContainer.scrollTop + resultsContainer.clientHeight) {
                    resultsContainer.scrollTop = active.offsetTop + active.offsetHeight - resultsContainer.clientHeight + 8;
                }
            } else {
                _searchActiveIdx = -1;
            }
        }

        var _noScrollTimer = null;

        function openSearch() {
            if (!searchPage || searchPage.classList.contains('search-active')) return;
            searchPage.classList.add('search-active');
            searchPage.setAttribute('aria-hidden', 'false');
            _noScrollTimer = setTimeout(function () { bodyEl.classList.add('no-scroll'); }, 400);
            if (searchInput) searchInput.focus();
            _searchActiveIdx = -1;
            ensurePagefind();
        }

        function closeSearch() {
            if (!searchPage) return;
            if (_noScrollTimer) { clearTimeout(_noScrollTimer); _noScrollTimer = null; }
            searchPage.classList.remove('search-active');
            searchPage.setAttribute('aria-hidden', 'true');
            bodyEl.classList.remove('no-scroll');
            if (searchInput) searchInput.value = '';
            resultsContainer.innerHTML = '';
            resultCount.textContent = '';
            resultCount.style.display = 'none';
            emptyState.style.display = 'none';
            _searchActiveIdx = -1;
        }

        searchOpenBtns.forEach(function(btn) {
            btn.addEventListener('click', function (e) { e.preventDefault(); openSearch(); });
        });

        if (searchCloseBtn) {
            searchCloseBtn.addEventListener('click', function (e) { e.preventDefault(); closeSearch(); });
        }

        if (emptyState) {
            emptyState.addEventListener('click', function (e) {
                var clearBtn = e.target.closest('.search-clear-btn');
                if (!clearBtn) return;
                e.preventDefault();
                if (searchInput) { searchInput.value = ''; searchInput.focus(); }
                resultsContainer.innerHTML = '';
                resultCount.textContent = '';
                resultCount.style.display = 'none';
                emptyState.style.display = 'none';
            });
        }

        // Close search when clicking a result link (mouse navigation)
        resultsContainer.addEventListener('click', function(e) {
            var link = e.target.closest('a');
            if (link) { closeSearch(); }
        });

        document.addEventListener('keydown', function (e) {
            var tag = (e.target.tagName || '').toLowerCase();
            var isInput = tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable;
            var searchActive = searchPage && searchPage.classList.contains('search-active');

            if (e.key === '/' && !isInput) { e.preventDefault(); openSearch(); return; }
            if (e.key === 'Escape' && searchActive) { e.preventDefault(); closeSearch(); return; }

            if (!searchActive) return;
            var items = resultsContainer.querySelectorAll('.search-result-item');
            if (items.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                var next = _searchActiveIdx + 1;
                if (next >= items.length) next = 0;
                setActiveResult(next);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                var prev = _searchActiveIdx - 1;
                if (prev < 0) prev = items.length - 1;
                setActiveResult(prev);
            } else if (e.key === 'Enter' && _searchActiveIdx >= 0) {
                e.preventDefault();
                var url = items[_searchActiveIdx].getAttribute('data-url');
                if (url) { closeSearch(); window.location.href = url; }
            }
        });

        // Focus trap: keep Tab inside search modal
        document.addEventListener('keydown', function(e) {
            if (!searchPage || !searchPage.classList.contains('search-active') || e.key !== 'Tab') return;
            var focusable = searchPage.querySelectorAll('input, button, a[href], [tabindex]:not([tabindex="-1"])');
            if (focusable.length === 0) return;
            var first = focusable[0];
            var last = focusable[focusable.length - 1];
            if (e.shiftKey) {
                if (document.activeElement === first) { e.preventDefault(); last.focus(); }
            } else {
                if (document.activeElement === last) { e.preventDefault(); first.focus(); }
            }
        });
    });
</script>
