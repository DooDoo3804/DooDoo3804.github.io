<!-- Subscribe CTA -->
<div class="subscribe-cta">
    <p class="subscribe-cta-text">이 블로그의 새 글을 구독하세요</p>
    <div class="subscribe-cta-links">
        <a href="{{ site.baseurl }}/feed.xml" class="subscribe-cta-btn subscribe-cta-rss" aria-label="RSS Feed">
            <svg class="icon" aria-hidden="true"><use href="#icon-rss"/></svg> RSS Feed
        </a>
        {% if site.github_username %}
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer" class="subscribe-cta-btn subscribe-cta-github" aria-label="Follow on GitHub">
            <svg class="icon" aria-hidden="true"><use href="#icon-github"/></svg> Follow
        </a>
        {% endif %}
    </div>
</div>
