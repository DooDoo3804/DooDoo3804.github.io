<!-- Giscus Comments -->
{% if site.giscus.repo %}
<div class="giscus-container" id="giscus-container">
    <div class="giscus-placeholder" id="giscus-placeholder">
        <span class="giscus-placeholder-spinner"></span>
        댓글을 불러오는 중...
    </div>
    <div class="giscus-error" id="giscus-error" style="display:none;">
        댓글을 불러올 수 없습니다. 잠시 후 다시 시도해주세요.
    </div>
    <script>
    (function() {
        var theme = document.documentElement.getAttribute('data-theme') === 'dark'
            ? '{{ site.giscus.theme_dark | default: "transparent_dark" }}'
            : '{{ site.giscus.theme_light | default: "light" }}';
        var s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.setAttribute('data-repo', '{{ site.giscus.repo }}');
        s.setAttribute('data-repo-id', '{{ site.giscus.repo_id }}');
        s.setAttribute('data-category', '{{ site.giscus.category | default: "Announcements" }}');
        s.setAttribute('data-category-id', '{{ site.giscus.category_id }}');
        s.setAttribute('data-mapping', '{{ site.giscus.mapping | default: "pathname" }}');
        s.setAttribute('data-strict', '0');
        s.setAttribute('data-reactions-enabled', '1');
        s.setAttribute('data-emit-metadata', '0');
        s.setAttribute('data-input-position', 'top');
        s.setAttribute('data-theme', theme);
        s.setAttribute('data-lang', 'ko');
        s.setAttribute('crossorigin', 'anonymous');
        s.async = true;
        document.getElementById('giscus-container').appendChild(s);

        var placeholder = document.getElementById('giscus-placeholder');
        var errorMsg = document.getElementById('giscus-error');
        var loaded = false;

        // Listen for giscus iframe load via message event
        window.addEventListener('message', function(e) {
            if (e.origin === 'https://giscus.app' && !loaded) {
                loaded = true;
                placeholder.style.display = 'none';
            }
        });

        // Timeout fallback: show error if not loaded in 5s
        setTimeout(function() {
            if (!loaded) {
                placeholder.style.display = 'none';
                errorMsg.style.display = 'block';
            }
        }, 5000);
    })();
    </script>
</div>
{% endif %}
