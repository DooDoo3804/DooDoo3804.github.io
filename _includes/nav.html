<!-- Navigation -->
<nav class="navbar navbar-default navbar-custom navbar-fixed-top{% if page.nav-style == 'invert' or page.header-style == 'text' %} invert{% endif %}" role="navigation" aria-label="Main navigation" data-pagefind-ignore>
    <div class="container-fluid">
        <div class="navbar-header page-scroll">
            <button type="button" class="navbar-toggle" aria-expanded="false" aria-controls="huxblog_navbar" aria-label="Toggle navigation">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
        </div>

        <div id="huxblog_navbar">
            <div class="navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li>
                        <a href="{{ site.baseurl }}/">Home</a>
                    </li>
                    {% for page in site.pages %}
                    {% if page.title and page.hide-in-nav != true and page.protected != true %}
                    <li>
                        <a href="{{ page.url | prepend: site.baseurl }}">{{ page.title }}</a>
                    </li>
                    {% endif %}
                    {% endfor %}
                    <li>
                        <a href="{{ site.baseurl }}{{ site.RSS }}" target="_blank" rel="noopener noreferrer" aria-label="RSS Feed">
                            <svg class="icon" aria-hidden="true"><use href="#icon-rss"/></svg>
                        </a>
                    </li>
                    <li class="search-icon">
                        <button type="button" aria-label="Search">
                            <svg class="icon" aria-hidden="true"><use href="#icon-magnifying-glass"/></svg>
                        </button>
                    </li>
                    <li>
                        <button type="button" class="dark-mode-toggle" aria-label="Toggle dark mode">
                            <svg class="icon" aria-hidden="true"><use href="#icon-moon"/></svg>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

    <script>
        // Drop Bootstrap low-performance Navbar
        // Use customize navbar with high-quality material design animation
        // in high-perf jank-free CSS3 implementation
        var $body = document.body;
        var $toggle = document.querySelector('.navbar-toggle');
        var $navbar = document.querySelector('#huxblog_navbar');
        var $collapse = document.querySelector('.navbar-collapse');

        var __HuxNav__ = {
            close: function () {
                $navbar.classList.remove('in');
                $toggle.setAttribute('aria-expanded', 'false');
                // wait until animation end.
                setTimeout(function () {
                    if (!$navbar.classList.contains('in')) {
                        $collapse.style.height = "0px"
                    }
                }, 400)
            },
            open: function () {
                $collapse.style.height = "auto"
                $navbar.classList.add('in');
                $toggle.setAttribute('aria-expanded', 'true');
            }
        }

        // Bind Event
        $toggle.addEventListener('click', function (e) {
            if ($navbar.classList.contains('in')) {
                __HuxNav__.close()
            } else {
                __HuxNav__.open()
            }
        })

        /**
         * Since Fastclick is used to delegate 'touchstart' globally
         * to hack 300ms delay in iOS by performing a fake 'click',
         * Using 'e.stopPropagation' to stop 'touchstart' event from 
         * $toggle/$collapse will break global delegation.
         * 
         * Instead, we use a 'e.target' filter to prevent handler
         * added to document close HuxNav.  
         *
         * Also, we use 'click' instead of 'touchstart' as compromise
         */
        document.addEventListener('click', function (e) {
            if (e.target == $toggle) return;
            if (e.target.classList.contains('icon-bar')) return;
            __HuxNav__.close();
        })
    </script>
