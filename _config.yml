# Site settings
title: DooDoo IT Blog
SEOTitle: DooDoo IT Blog | Backend Dev Blog by DoYoon Kim
# header-img removed - using CSS gradients instead
email: doodoo3804@gmail.com
description: "Backend development blog by DoYoon Kim. Notes on algorithms, data structures, Kotlin, Java, Spring Boot, and system design. | 백엔드 개발 블로그 — 알고리즘, 자료구조, Kotlin, Java, Spring Boot 학습 기록."
keyword: "backend development, algorithms, data structures, Kotlin, Java, Spring Boot, JPA, REST API, system design, Docker, dev blog, DoYoon Kim, DooDoo, 백엔드 개발, 알고리즘, 자료구조, 개발 블로그, 김도윤"
url: "https://doodoo3804.github.io" # your host, for absolute URL
baseurl: "" # for example, '/blog' if your blog hosted on 'host/blog'

# Publish posts or collection documents with a future date.
future: true

# SNS settings
RSS: "/feed.xml"
github_username: doodoo3804
email_address: doodoo3804@gmail.com
# twitter_username: huxpro
# facebook_username:  huxpro
linkedin_username: doodoo3804

# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
exclude:
  [
    "less",
    "node_modules",
    "Gruntfile.js",
    "package.json",
    "package-lock.json",
    "README.md",
    "README.zh.md",
    "dev-react-pages",
    "TEAM.md",
    "Makefile",
    "scripts"
  ]
anchorjs: true # if you want to customize anchor. check out line:181 of `post.html`
timezone: Asia/Seoul

# Gems
# from PR#40, to support local preview for Jekyll 3.0
# make sure you have this gem installed
# `$ gem install jekyll-paginate`
plugins: []

# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM # use Github Flavored Markdown !important
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Disqus settings
disqus_username: https-doodoo3804-github-io

# Netease settings
netease_comment: false

# Analytics settings
# Baidu Analytics
# ba_track_id: [your track id]

# Google Analytics
# ga_track_id: "UA-49627206-1" # Format: UA-xxxxxx-xx
# ga_domain: huangxuan.me

# Sidebar settings
sidebar: true # whether or not using Sidebar.
sidebar-about-description: "On a journey to become a backend developer."
# picture
sidebar-avatar: /img/avatar.gif # locally hosted — was previously on tammolo.com CDN

# Featured Tags
featured-tags: true # whether or not using Feature-Tags
featured-condition-size: 1 # A tag will be featured if the size of it is more than this condition value

# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true

# Last updated signal is now auto-generated via site.posts.first.date in index.html

# Featured Post — set slug to pin a specific post, or leave blank for latest
# featured_post_slug: "2026-04-06-database-transaction-isolation"

# MathJax rendering for layout:page (e.g. post preview)
page-mathjax: false

# Giscus Comments
giscus:
  repo: "DooDoo3804/DooDoo3804.github.io"
  repo_id: "REPLACE_WITH_REPO_ID"
  category: "Announcements"
  category_id: "REPLACE_WITH_CATEGORY_ID"
  mapping: "pathname"
  theme_light: "light"
  theme_dark: "transparent_dark"

# GoatCounter Analytics
goatcounter:
  enabled: false
  code: "REPLACE_WITH_YOUR_CODE"

