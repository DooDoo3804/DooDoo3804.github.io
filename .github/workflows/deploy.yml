name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          # Pinned to exact patch: "3.1" currently resolves to 3.1.7 (final 3.1.x).
          # Exact pin freezes today's behavior without touching Gemfile.lock.
          ruby-version: "3.1.7"
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build JS (uglify + banner)
        run: npx grunt

      - name: Install fonts for OG image generation (Inter + Noto CJK)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-inter

      - name: Generate OG images for posts
        run: node scripts/generate-og-images.js

      - name: Build Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Stamp sw.js CACHE_VERSION with build timestamp
        run: |
          if [ ! -f _site/sw.js ]; then
            echo "::error::_site/sw.js not found — service worker missing from build output"
            exit 1
          fi
          if ! grep -q __BUILD_VERSION__ _site/sw.js; then
            echo "::error::sw.js placeholder __BUILD_VERSION__ missing — source sw.js was renamed or pre-stamped"
            exit 1
          fi
          sed -i "s/__BUILD_VERSION__/v$(date +%Y%m%d%H%M%S)/" _site/sw.js
          if grep -q __BUILD_VERSION__ _site/sw.js; then
            echo "::error::sw.js stamp failed — __BUILD_VERSION__ placeholder still present"
            exit 1
          fi

      - name: Build Pagefind search index
        run: npx -y pagefind@1.5.2

      - name: Encrypt protected pages
        run: bash scripts/encrypt-pages.sh "${{ secrets.PAGE_PASSWORD }}"
        env:
          PAGE_PASSWORD: ${{ secrets.PAGE_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # v4+ excludes dotfiles (.[^/]*) by default; v3 included them.
          # Preserve v3 behavior so no _site dotfile is silently dropped.
          # (.git/.github are excluded regardless and aren't in _site anyway.)
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
