name: CI Dry Run (build verification, no deploy)

# Mirrors the build job of deploy.yml WITHOUT any Pages deployment.
# Gate for the build-hardening branch: must be green before merging to master.

on:
  push:
    branches: [build-hardening]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: "ci-dryrun-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-dryrun:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.7"
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build JS (uglify + banner)
        run: npx grunt

      - name: Install fonts for OG image generation (Inter + Noto CJK)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-inter

      - name: Generate OG images for posts
        run: node scripts/generate-og-images.js

      - name: Build Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Stamp sw.js CACHE_VERSION with build timestamp
        run: |
          if [ ! -f _site/sw.js ]; then
            echo "::error::_site/sw.js not found — service worker missing from build output"
            exit 1
          fi
          sed -i "s/__BUILD_VERSION__/v$(date +%Y%m%d%H%M%S)/" _site/sw.js
          if grep -q __BUILD_VERSION__ _site/sw.js; then
            echo "::error::sw.js stamp failed — __BUILD_VERSION__ placeholder still present"
            exit 1
          fi

      - name: Build Pagefind search index
        run: npx -y pagefind@1.5.2

      - name: Encrypt protected pages
        run: bash scripts/encrypt-pages.sh "${{ secrets.PAGE_PASSWORD }}"
        env:
          PAGE_PASSWORD: ${{ secrets.PAGE_PASSWORD }}
